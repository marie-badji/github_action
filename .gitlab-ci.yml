stages:
  - build
  - test
  - deploy

image: node:18-alpine

build job:
  stage: build
  cache:
    paths:
      - node_modules/
  script:
    - npm install --force
    - npm run build
    - mkdir -p artifact
    - mv build/* artifact/
  artifacts:
    paths:
      - artifact/

unit test job:
  stage: test
  timeout: 15m
  script:
    - npm install --force
    - npm test -- --watchAll=false --passWithNoTests
  allow_failure: true

deploy job:
  stage: deploy
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t $DOCKER_HUB_USER/todo-front:latest .
    - docker login -u $DOCKER_HUB_USER -p $DOCKER_HUB_TOKEN
    - docker push $DOCKER_HUB_USER/todo-front:latest
  when: manual